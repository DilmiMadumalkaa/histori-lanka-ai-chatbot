services:
  - type: web
    name: historical-sites-chatbot-api
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PINECONE_INDEX_NAME
        value: historical-sites-sl
      - key: PINECONE_ENV
        value: us-east-1
      - key: ALLOWED_ORIGINS
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_API_VERSION
        value: 2024-02-01
      - key: AZURE_OPENAI_CHAT_DEPLOYMENT
        sync: false
      - key: AZURE_OPENAI_GPT_DEPLOYMENT
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT
        sync: false
      - key: AZURE_OPENAI_EMBEDDING_DEPLOYMENT
        sync: false
      - key: AZURE_OPENAI_EMBEDDING_API_VERSION
        value: 2024-02-01
      - key: PINECONE_API_KEY
        sync: false

  - type: web
    name: historical-sites-chatbot-frontend
    env: static
    rootDir: frontend
    plan: free
    autoDeploy: true
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
